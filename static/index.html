<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>kuutar v0</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b0d12; color: #cdd; font-family: sans-serif; overflow: hidden; }
    #graph { position: absolute; inset: 0; }

    #legend { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 6px; font-size: 12px; z-index: 2; }
    .shape-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .swatch { display: inline-block; width: 14px; text-align: center; }

    #series-panel {
      position: absolute; left: 0; top: 160px; bottom: 8px; width: 210px;
      padding: 8px 12px;
      font-size: 11px; color: #cdd; z-index: 2;
      overflow-y: auto;
      background: linear-gradient(to right, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 100%);
    }
    #series-panel h3 { margin: 0 0 6px 0; font-size: 11px; font-weight: 600; opacity: 0.7; letter-spacing: 0.05em; text-transform: uppercase; }
    #series-list { list-style: none; padding: 0; margin: 0; }
    #series-list li {
      padding: 2px 4px; border-radius: 3px; cursor: default;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.15s;
    }
    #series-list li.active { color: var(--series-color, #fff); font-weight: 600; }
    #series-list li.neighbor { color: var(--series-color, #cdd); opacity: 0.75; }

    #commit-panel {
      position: absolute; right: 0; top: 0; bottom: 0; width: 320px;
      padding: 16px 18px; box-sizing: border-box;
      background: linear-gradient(to left, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%);
      color: #cdd; font-size: 12px; z-index: 3;
      transform: translateX(100%); transition: transform 0.25s ease;
      overflow-y: auto;
      pointer-events: none;  /* don't swallow pointermoves for the 3D canvas */
    }
    #commit-panel .close { pointer-events: auto; }
    #commit-panel.open { transform: translateX(0); }
    #commit-panel h3 { margin: 0 0 10px 0; font-size: 11px; font-weight: 600;
      opacity: 0.7; letter-spacing: 0.05em; text-transform: uppercase; }
    #commit-panel .sha { font-family: ui-monospace, Menlo, monospace;
      color: #ffc860; font-size: 13px; }
    #commit-panel .subject { margin: 8px 0; font-size: 14px; color: #fff; }
    #commit-panel .meta { opacity: 0.7; margin: 4px 0; }
    #commit-panel .delta { margin-top: 14px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.1); }
    #commit-panel .delta .big { font-size: 18px; color: #ffc860; }
    #commit-panel .delta .big.down { color: #ff6b6b; }
    #commit-panel .close { position: absolute; top: 8px; right: 12px;
      cursor: pointer; opacity: 0.5; font-size: 16px; }
    #commit-panel .close:hover { opacity: 1; }
    #cp-hint { position: absolute; bottom: 8px; right: 8px;
      font-size: 11px; color: #cdd; opacity: 0.5; z-index: 2; }

    #filters {
      position: absolute; top: 10px; left: 50%;
      transform: translateX(-50%); z-index: 4;
      display: flex; align-items: flex-end; gap: 20px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #cdd; font-size: 11px;
      backdrop-filter: blur(4px);
      max-width: 80vw; flex-wrap: wrap;
    }
    #filters .group { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    #filters .group-title { opacity: 0.6; font-size: 10px; letter-spacing: 0.05em;
                            text-transform: uppercase; }
    #filters .radios { display: flex; flex-direction: column; gap: 2px; }
    #filters .radios label { display: flex; align-items: center; gap: 6px; cursor: pointer;
                             max-width: 260px; white-space: nowrap; overflow: hidden;
                             text-overflow: ellipsis; }
    #filters input[type="radio"] { margin: 0; accent-color: #78c8ff; }
    #filters .slider-group { min-width: 280px; }
    #filters .slider-wrap { position: relative; height: 28px; display: flex; align-items: center; }
    #filters .slider-wrap input[type="range"] {
      position: absolute; width: 100%; pointer-events: none;
      -webkit-appearance: none; appearance: none; background: none;
      height: 4px; top: 12px; left: 0; margin: 0;
    }
    #filters .slider-wrap input[type="range"]::-webkit-slider-runnable-track {
      height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px;
    }
    #filters .slider-wrap input[type="range"]::-moz-range-track {
      height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px;
    }
    #filters .slider-wrap input[type="range"]::-webkit-slider-thumb {
      pointer-events: auto; -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #78c8ff; border: none; cursor: pointer;
      margin-top: -5px;
    }
    #filters .slider-wrap input[type="range"]::-moz-range-thumb {
      pointer-events: auto;
      width: 14px; height: 14px; border-radius: 50%;
      background: #78c8ff; border: none; cursor: pointer;
    }
    #filters .slider-labels { display: flex; justify-content: space-between; font-size: 10px;
                              opacity: 0.7; margin-top: 2px; font-family: ui-monospace, Menlo, monospace; }

    #flyover {
      position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%); z-index: 4;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      color: #cdd; font-size: 12px;
      backdrop-filter: blur(4px);
    }
    #flyover button {
      background: none; border: none; color: #cdd; cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 4px;
      line-height: 1;
    }
    #flyover button:hover { background: rgba(255,255,255,0.08); color: #fff; }
    #flyover button:disabled { opacity: 0.3; cursor: default; }
    #fly-counter { opacity: 0.7; min-width: 60px; text-align: center; }
    #fly-status { opacity: 0.7; font-style: italic; min-width: 110px; }
</style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="legend">
    <strong>kuutar v0</strong><br/>
    <div class="shape-row"><span class="swatch">●</span> duration (s/ms/ns)</div>
    <div class="shape-row"><span class="swatch">▶</span> throughput (ops/s)</div>
    <div class="shape-row"><span class="swatch">■</span> size (bytes)</div>
    <div class="shape-row"><span class="swatch">▬</span> ratio (%)</div>
    <div class="shape-row"><span class="swatch">◆</span> count</div>
    <div style="margin-top:8px; opacity:0.6; font-size:11px; line-height:1.5;">
      drag to rotate · right-drag to pan · scroll to zoom
    </div>
    <div id="status" style="margin-top:6px; opacity:0.7;"></div>
  </div>

  <div id="series-panel">
    <h3>series</h3>
    <ul id="series-list"></ul>
  </div>

  <div id="graph"></div>

  <div id="filters" style="display: none"></div>

  <div id="commit-panel">
    <span class="close" id="cp-close">✕</span>
    <div id="cp-body"></div>
  </div>

  <div id="cp-hint">hover any point for commit details · red = regression, green = improvement</div>

  <div id="flyover">
    <button id="fly-prev" title="previous change point">⏮</button>
    <button id="fly-play" title="play / pause">▶</button>
    <button id="fly-next" title="next change point">⏭</button>
    <span id="fly-counter">–</span>
    <span id="fly-status"></span>
  </div>

  <script type="module">
    import { Kuutar } from "./kuutar.js";

    const container = document.getElementById("graph");
    const status = document.getElementById("status");
    const list = document.getElementById("series-list");

    const k = new Kuutar(container);

    let items = [];  // zi -> <li>

    function buildLegend(series) {
      list.innerHTML = "";
      items = [];
      for (const s of series) {
        const li = document.createElement("li");
        li.dataset.zi = s.zi;
        li.textContent = s.name;
        li.style.setProperty("--series-color", "#" + s.color.toString(16).padStart(6, "0"));
        li.addEventListener("mouseenter", () => k.hoverSeries(s.zi));
        li.addEventListener("mouseleave", () => k.hoverSeries(-1));
        list.appendChild(li);
        items[s.zi] = li;
      }
    }

    const panel = document.getElementById("commit-panel");
    const panelBody = document.getElementById("cp-body");
    document.getElementById("cp-close").addEventListener("click", () => panel.classList.remove("open"));

    function fmtNum(x) {
      if (Math.abs(x) >= 1000) return x.toFixed(0);
      if (Math.abs(x) >= 10) return x.toFixed(1);
      return x.toFixed(3);
    }
    function fmtDate(ms) {
      const d = new Date(ms);
      return isNaN(d.getTime()) ? "?" : d.toISOString().slice(0, 10);
    }
    function commitDate(c, fallbackMs) {
      if (c && typeof c.commit_time === "number") return fmtDate(c.commit_time * 1000);
      return fmtDate(fallbackMs);
    }
    function showPoint(p, siblings) {
      const c = p.commit || {};
      const header = `
        <div class="sha">${c.short_sha || (c.sha || "").slice(0,7)}</div>
        <div class="subject">${c.message || "(no message)"}</div>
        <div class="meta">${c.author || "?"} · ${commitDate(c, p.timestamp)}${c.ref ? " · " + c.ref : ""}${c.repo ? " · " + c.repo : ""}</div>
      `;
      let body;
      if (siblings && siblings.length > 0) {
        // Multiple change points landed on this commit — list all,
        // largest first. The visual highlight is on siblings[0].
        const count = siblings.length;
        const items = siblings.map(s => {
          const u = s.mesh.userData;
          const pct = u.cpDeltaPct * 100;
          const sign = pct >= 0 ? "+" : "";
          const klass = u.regression ? "down" : "";
          const label = u.regression ? "regression" : "improvement";
          return `
            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);">
              <div class="meta">${u.series_name}</div>
              <div class="meta">${label} · ${u.direction || ""}</div>
              <div class="big ${klass}">${sign}${pct.toFixed(1)}%</div>
              <div class="meta">${fmtNum(u.cpBefore)} → ${fmtNum(u.cpAfter)} ${u.unit || ""}</div>
            </div>`;
        }).join("");
        body = `
          <div class="meta" style="margin-top: 10px;">${count} change point${count>1?"s":""} on this commit</div>
          ${items}
        `;
      } else {
        let deltaBlock = "";
        if (p.isChangePoint) {
          const pct = p.cpDeltaPct * 100;
          const sign = pct >= 0 ? "+" : "";
          const label = p.regression ? "regression" : "improvement";
          const klass = p.regression ? "down" : "";
          deltaBlock = `
            <div class="delta">
              <div class="meta">${label} · ${p.direction || ""}</div>
              <div class="big ${klass}">${sign}${pct.toFixed(1)}%</div>
              <div class="meta">${fmtNum(p.cpBefore)} → ${fmtNum(p.cpAfter)} ${p.unit || ""}</div>
            </div>`;
        }
        body = `
          <div class="meta">series: <span style="color:#fff">${p.series_name}</span></div>
          <div class="meta">value: <span style="color:#fff">${fmtNum(p.value)} ${p.unit || ""}</span></div>
          ${deltaBlock}
        `;
      }
      panelBody.innerHTML = header + body;
      panel.classList.add("open");
    }

    const flyPlay = document.getElementById("fly-play");
    const flyPrev = document.getElementById("fly-prev");
    const flyNext = document.getElementById("fly-next");
    const flyCounter = document.getElementById("fly-counter");
    const flyStatus = document.getElementById("fly-status");

    flyPlay.addEventListener("click", () => k.toggleFlyover());
    flyPrev.addEventListener("click", () => k.stepFlyover(-1));
    flyNext.addEventListener("click", () => k.stepFlyover(+1));

    function updateFlyover(e) {
      const total = e.total || 0;
      flyCounter.textContent = total > 0 ? `${Math.min(e.idx + 1, total)} / ${total}` : "–";
      if (e.state === "countdown") {
        flyPlay.textContent = "⏸";
        flyStatus.textContent = `starts in ${e.countdown}s`;
      } else if (e.state === "playing") {
        flyPlay.textContent = "⏸";
        flyStatus.textContent = "playing";
      } else if (e.state === "paused") {
        flyPlay.textContent = "▶";
        flyStatus.textContent = "paused";
      } else if (e.state === "done") {
        flyPlay.textContent = "▶";
        flyStatus.textContent = "end — ▶ to replay";
      } else {
        flyPlay.textContent = "▶";
        flyStatus.textContent = "";
      }
      flyPrev.disabled = total === 0 || e.idx <= 0;
      flyNext.disabled = total === 0 || e.idx >= total - 1;
    }

    k.narrator.subscribe(e => {
      if (e.type === "render_complete") {
        status.textContent = `${e.point_count} points across ${e.series_count} series · ${e.change_points} change points`;
        buildLegend(e.series);
        // Kick off the flyover automatically — the 10s countdown gives
        // viewers time to read the scene first.
        k.startFlyover();
      } else if (e.type === "flyover_state") {
        updateFlyover(e);
      } else if (e.type === "point_hovered") {
        showPoint(e.point, e.siblings);
      } else if (e.type === "hover_changed") {
        for (let i = 0; i < items.length; i++) {
          const li = items[i];
          if (!li) continue;
          li.classList.remove("active", "neighbor");
          if (e.zi === -1) continue;
          if (i === e.zi) li.classList.add("active");
          else if (Math.abs(i - e.zi) === 1) li.classList.add("neighbor");
        }
        if (e.zi !== -1 && items[e.zi]) {
          items[e.zi].scrollIntoView({ block: "nearest" });
        }
      }
    });

    // ---- filters bar (facets + time slider) ----------------------------

    const urlParams = new URLSearchParams(location.search);
    let repoRaw = urlParams.get("repo") || "gh/demo/bench";
    repoRaw = repoRaw.replace(/^\/?api\/v3\/tests\//, "");
    const [repoPath, extraQs] = repoRaw.split("?");
    const extraParams = new URLSearchParams(extraQs || "");
    const testsBase = `/api/v3/tests/${repoPath}`;
    const facetsBase = `${testsBase}/facets`;

    // Mutable filter state. `metric` is always present (even for demo data
    // that has only one metric); runner / workflow / branch are populated
    // by facets when they vary.
    const filters = {
      metric: urlParams.get("metric") || extraParams.get("metric") || "",
      branch: "", workflow: "", runner: "",
      since: "", until: "",
    };

    function buildQs(src, extraExclude = []) {
      const parts = [];
      for (const [k, v] of Object.entries(src)) {
        if (v && !extraExclude.includes(k)) {
          parts.push(`${encodeURIComponent(k)}=${encodeURIComponent(v)}`);
        }
      }
      return parts.length ? "?" + parts.join("&") : "";
    }

    const filtersEl = document.getElementById("filters");

    function extractTs(x) {
      if (x && typeof x === "object" && "$date" in x) return new Date(x.$date).getTime();
      if (typeof x === "string") return new Date(x).getTime();
      return 0;
    }

    function fmtDay(ms) {
      const d = new Date(ms);
      return isNaN(d.getTime()) ? "?" : d.toISOString().slice(0, 10);
    }

    function renderFilters(facetsData) {
      filtersEl.innerHTML = "";
      // Hide the whole bar if there are no varying dims and no timestamps
      // (e.g., empty dataset).
      const span = facetsData.timestamp_span;
      const varying = facetsData.varying || [];
      if (varying.length === 0 && !span) {
        filtersEl.style.display = "none";
        return;
      }
      filtersEl.style.display = "flex";

      // Radio group per varying dim.
      for (const dim of varying) {
        const values = facetsData.facets[dim] || [];
        const group = document.createElement("div");
        group.className = "group";
        const h = document.createElement("div");
        h.className = "group-title";
        h.textContent = dim;
        group.appendChild(h);
        const radios = document.createElement("div");
        radios.className = "radios";
        const mkRadio = (val, label) => {
          const id = `f-${dim}-${btoa(val || "all").replace(/=/g,"")}`;
          const wrap = document.createElement("label");
          wrap.setAttribute("for", id);
          const input = document.createElement("input");
          input.type = "radio"; input.name = `filter-${dim}`; input.id = id;
          input.value = val;
          input.checked = (filters[dim] === val) || (!filters[dim] && val === "");
          input.addEventListener("change", () => {
            filters[dim] = val;
            void reload();
          });
          wrap.appendChild(input);
          const txt = document.createTextNode(label);
          wrap.appendChild(txt);
          wrap.title = label;
          radios.appendChild(wrap);
        };
        mkRadio("", `all (${values.length})`);
        for (const v of values) mkRadio(v, v);
        group.appendChild(radios);
        filtersEl.appendChild(group);
      }

      // Time range slider.
      if (span) {
        const minMs = extractTs(span.min);
        const maxMs = extractTs(span.max);
        const day = 86400 * 1000;
        // Snap bounds to day resolution, inclusive on both ends.
        const lo = Math.floor(minMs / day) * day;
        const hi = Math.ceil(maxMs / day) * day;
        const sinceMs = filters.since ? new Date(filters.since).getTime() : lo;
        const untilMs = filters.until ? new Date(filters.until).getTime() : hi;
        const group = document.createElement("div");
        group.className = "group slider-group";
        group.innerHTML = `
          <div class="group-title">time range</div>
          <div class="slider-wrap">
            <input id="f-since" type="range" min="${lo}" max="${hi}" step="${day}" value="${sinceMs}">
            <input id="f-until" type="range" min="${lo}" max="${hi}" step="${day}" value="${untilMs}">
          </div>
          <div class="slider-labels">
            <span id="f-since-label">${fmtDay(sinceMs)}</span>
            <span id="f-until-label">${fmtDay(untilMs)}</span>
          </div>
        `;
        filtersEl.appendChild(group);
        const sinceEl = group.querySelector("#f-since");
        const untilEl = group.querySelector("#f-until");
        const sinceLab = group.querySelector("#f-since-label");
        const untilLab = group.querySelector("#f-until-label");
        const update = () => {
          let s = +sinceEl.value, u = +untilEl.value;
          if (s > u) {
            // Keep the handles from crossing: snap the other side.
            if (document.activeElement === sinceEl) untilEl.value = s;
            else sinceEl.value = u;
            s = +sinceEl.value; u = +untilEl.value;
          }
          sinceLab.textContent = fmtDay(s);
          untilLab.textContent = fmtDay(u);
        };
        const commit = () => {
          const s = +sinceEl.value, u = +untilEl.value;
          filters.since = (s > lo) ? new Date(s).toISOString() : "";
          filters.until = (u < hi) ? new Date(u).toISOString() : "";
          void reload();
        };
        sinceEl.addEventListener("input", update);
        untilEl.addEventListener("input", update);
        sinceEl.addEventListener("change", commit);
        untilEl.addEventListener("change", commit);
      }
    }

    async function reload() {
      try {
        // Facets first so the sidebar reflects the current slice.
        const fr = await fetch(facetsBase + buildQs(filters, ["since", "until"]));
        if (!fr.ok) throw new Error(`facets: ${fr.status}`);
        const facetsData = await fr.json();
        renderFilters(facetsData);
        await k.fetchAndRender(testsBase + buildQs(filters));
      } catch (e) {
        status.textContent = "error: " + e.message;
      }
    }

    void reload();
  </script>
</body>
</html>
